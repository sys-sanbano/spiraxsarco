<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Climate Clock Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Slow spinning animation for the hourglass icon */
        .animate-spin-slow {
            animation: spin 3s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .transition-all-300 {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="bg-white min-h-screen flex justify-center">

    <div class="w-full max-w-md">
        <section>
            <div class="bg-transparent py-1 px-5 flex-grow flex flex-col justify-between relative overflow-hidden transition-all-300">
                
                <div class="relative z-10">
                    <p class="text-lg font-bold text-[#005D99] flex items-center gap-1.5 mb-3">
                        <i class="fa-solid fa-hourglass-half animate-spin-slow"></i>
                        TIME LEFT UNTIL CO₂ BUDGET DEPLETED
                    </p>
                    <p class="text-xs text-slate-500 mb-3">Countdown to 2.0°C climate threshold</p>
                    
                    <div class="grid grid-cols-6 gap-1 bg-slate-50 border border-slate-200 p-3 rounded-xl font-mono text-center mb-4">
                        <div>
                            <span id="cd-yr" class="text-xl md:text-2xl font-bold text-[#005D99]">00</span>
                            <span class="block text-[8px] text-slate-500 uppercase font-semibold">yr</span>
                        </div>
                        <div>
                            <span id="cd-mo" class="text-xl md:text-2xl font-bold text-[#005D99]">00</span>
                            <span class="block text-[8px] text-slate-500 uppercase font-semibold">mo</span>
                        </div>
                        <div>
                            <span id="cd-dy" class="text-xl md:text-2xl font-bold text-[#005D99]">00</span>
                            <span class="block text-[8px] text-slate-500 uppercase font-semibold">dy</span>
                        </div>
                        <div>
                            <span id="cd-hr" class="text-xl md:text-2xl font-bold text-[#005D99]">00</span>
                            <span class="block text-[8px] text-slate-500 uppercase font-semibold">hr</span>
                        </div>
                        <div>
                            <span id="cd-mn" class="text-xl md:text-2xl font-bold text-[#005D99]">00</span>
                            <span class="block text-[8px] text-slate-500 uppercase font-semibold">min</span>
                        </div>
                        <div>
                            <span id="cd-sc" class="text-xl md:text-2xl font-bold text-[#005D99]">00</span>
                            <span class="block text-[8px] text-slate-500 uppercase font-semibold">sec</span>
                        </div>
                    </div>
                </div>

                <div class="relative z-10 border-t border-slate-200 pt-4">
                    <p class="text-xs text-slate-500 mb-1 uppercase font-bold tracking-wider">Remaining CO₂ Budget</p>
                    <p class="text-[11px] text-slate-400 mb-2">CO₂ budget left (tonnes)</p>
                    <p id="co2-budget" class="text-3xl font-black text-[#005D99] font-mono tracking-wider">
                        000,000,000,000
                    </p>
                </div>
            </div>
        </section>
    </div>

    <script>
        // --- 2.0°C 기후 저지선 데이터 세팅 ---
        const BASE_BUDGET_2020 = 1150000000000; 
        const BASE_TIME_2020 = new Date("2020-01-01T00:00:00Z").getTime();
        const EMISSION_PER_SECOND = 1331.8159; 

        function updateClimateClock() {
            const now = Date.now();
            const elapsedSeconds = (now - BASE_TIME_2020) / 1000;

            const currentBudget = BASE_BUDGET_2020 - (elapsedSeconds * EMISSION_PER_SECOND);
            document.getElementById('co2-budget').innerText = Math.max(0, Math.floor(currentBudget)).toLocaleString();

            const remainingSeconds = currentBudget / EMISSION_PER_SECOND;
            
            if (remainingSeconds <= 0) {
                document.querySelectorAll('[id^="cd-"]').forEach(el => el.innerText = "00");
                return;
            }

            const SECONDS_IN_YEAR = 365.25 * 24 * 60 * 60;
            const SECONDS_IN_MONTH = (365.25 / 12) * 24 * 60 * 60;
            const SECONDS_IN_DAY = 24 * 60 * 60;
            const SECONDS_IN_HOUR = 60 * 60;
            const SECONDS_IN_MINUTE = 60;

            let rem = remainingSeconds;

            const years = Math.floor(rem / SECONDS_IN_YEAR);
            rem %= SECONDS_IN_YEAR;

            const months = Math.floor(rem / SECONDS_IN_MONTH);
            rem %= SECONDS_IN_MONTH;

            const days = Math.floor(rem / SECONDS_IN_DAY);
            rem %= SECONDS_IN_DAY;

            const hours = Math.floor(rem / SECONDS_IN_HOUR);
            rem %= SECONDS_IN_HOUR;

            const minutes = Math.floor(rem / SECONDS_IN_MINUTE);
            const seconds = Math.floor(rem % SECONDS_IN_MINUTE);

            document.getElementById('cd-yr').innerText = String(years).padStart(2, '0');
            document.getElementById('cd-mo').innerText = String(months).padStart(2, '0');
            document.getElementById('cd-dy').innerText = String(days).padStart(2, '0');
            document.getElementById('cd-hr').innerText = String(hours).padStart(2, '0');
            document.getElementById('cd-mn').innerText = String(minutes).padStart(2, '0');
            document.getElementById('cd-sc').innerText = String(seconds).padStart(2, '0');
        }

        updateClimateClock();
        setInterval(updateClimateClock, 1000);
    </script>
</body>
</html>
